on:
  pull_request:
    branches:
      - develop
      - main
  push:
    tags:
      - '*.*.*'
      - '*.*.*-rc*'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Check for GitLeaks
        uses: gacts/gitleaks@v1